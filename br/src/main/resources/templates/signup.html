<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta • NexChat</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/signup.css}">

</head>

<body>

  <div class="register-container">

    <div class="logo">
      <img th:src="@{/icons/robot.png}" alt="Robot Logo">
      <h1>Criar Conta</h1>
    </div>

    <form id="registerForm" th:method="post" th:action="@{/saveUser}">
      <div class="input-group">
        <label>Nome</label>
        <input type="text" id="name" th:name="nome" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" th:name="email" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="password" th:name="senha" required>
      </div>

      <div class="input-group">
        <label>Confirmar Senha</label>
        <input type="password" id="confirmPassword" th:name="confirmSenha" required>
        <div class="error-message" id="errorMsg">
          As senhas não coincidem.
        </div>
      </div>

      <button type="submit" class="register-btn">
        Criar Conta
      </button>
    </form>

    <div class="footer">
      Já tem conta? <a th:href="@{/login}">Entrar</a>
    </div>

  </div>

  <script th:src="@{/js/signup.js}"></script>

</body>

</html>
