<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • NexChat</title>
  <link rel="icon" th:href="@{/icons/favicon.ico}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/signin.css}">
  <link rel="manifest" th:href="@{/manifest.json}">
</head>

<body>

  <div class="login-container">

    <div class="logo">
      <img th:src="@{/icons/robot.png}" alt="Robot Logo">
      <h1>NexChat</h1>
    </div>

    <form method="post" th:action="@{/login}">

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="username" placeholder="seu@email.com" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <input type="hidden" name="redirect" th:value="${redirect != null ? redirect : ''}">

      <button type="submit" class="login-btn">
        Entrar
      </button>

    </form>

    <div class="footer">
      Não tem conta? <a th:href="@{/login/signup}">Criar conta</a>
    </div>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>

</html>
