<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexChat</title>
  <link rel="icon" th:href="@{/icons/favicon.ico}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/bots.css}">
  <link rel="manifest" th:href="@{/manifest.json}">
</head>

<script>
  console.log("script carregou");

  if ("serviceWorker" in navigator) {
    console.log("Service Worker suportado");

    navigator.serviceWorker.register("/sw.js")
      .then(function (reg) {
        console.log("Service Worker registrado:", reg.scope);
      })
      .catch(function (err) {
        console.log("Erro ao registrar Service Worker:", err);
      });

  } else {
    console.log("Service Worker não suportado");
  }
</script>

<body>

  <!-- ========================= -->
  <!-- SIDEBAR -->
  <!-- ========================= -->

  <div class="sidebar">

    <div class="logo">
      <img th:src="@{/icons/robot.png}" alt="Robot">
      <a th:href="@{/}" class="NexChat">NexChat</a>
    </div>

    <div class="new-chats">
      <form th:action="@{/CreateBot}" method="post" class="new-chat">
        <button type="submit">
          + Novo Chat
        </button>
      </form>

      <form action="/projeto/newproject" method="post">
        <button class="new-folder">
          <img th:src="@{/icons/newFolder.svg}" alt="Nova Pasta">
        </button>
      </form>
    </div>

    <div class="chats">
      <div th:each="projeto : ${projetos}" class="chat-item project-item" th:attr="data-id=${projeto.id}">

        <div class="chat-link project-toggle">
          <span class="arrow">▶</span>
          <span class="bot-name" th:text="${projeto.nome}"></span>
        </div>

        <div class="bot-menu">
          <div class="dots">⋮</div>
          <div class="dropdown">
            <button class="dropdown-item rename-btn-project" th:attr="data-id=${projeto.id}">
              Renomear
            </button>

            <button class="dropdown-item delete-project" th:attr="data-id=${projeto.id}">
              Excluir
            </button>
          </div>
        </div>

        <!-- BOTS DO PROJETO -->
        <div class="project-bots">
          <div th:each="bot : ${bots}" th:if="${bot.projeto != null and bot.projeto.id == projeto.id}"
            class="chat-item bot-inside" th:attr="data-id=${bot.id}">

            <div class="chat-link">
              <a th:href="@{/bots/{id}(id=${bot.id})}" class="chat-content">
                <span class="bot-name" th:text="${bot.nome}"></span>
              </a>
            </div>

            <div class="bot-menu">
              <div class="dots">⋮</div>
              <div class="dropdown">
                <button class="dropdown-item rename-btn" th:attr="data-id=${bot.id}">
                  Renomear
                </button>

                <button class="dropdown-item">
                  Mover
                </button>

                <button class="dropdown-item delete" th:attr="data-id=${bot.id}">
                  Excluir
                </button>
              </div>
            </div>

          </div>
        </div>

      </div>
      <div th:each="bot : ${bots}" th:if="${bot.projeto == null}" class="chat-item" th:attr="data-id=${bot.id}">

        <div class="chat-link">
          <a th:href="@{/bots/{id}(id=${bot.id})}" class="chat-content">
            <span class="bot-name" th:text="${bot.nome}"></span>
          </a>
        </div>

        <div class="bot-menu">
          <div class="dots">⋮</div>
          <div class="dropdown">
            <button class="dropdown-item rename-btn" th:attr="data-id=${bot.id}">
              Renomear
            </button>

            <button class="dropdown-item">
              Mover
            </button>

            <button class="dropdown-item delete" th:attr="data-id=${bot.id}">
              Excluir
            </button>
          </div>
        </div>

      </div>
    </div>

    <div class="user">
      <a href="/user">[[${user.nome}]]</a><br>
      <small><a href="/user">[[${user.email}]]</a></small>
    </div>

  </div>

  <!-- ========================= -->
  <!-- MAIN -->
  <!-- ========================= -->

  <div class="main">

    <div class="header">
      <div class="share" onclick="">
        <img th:src="@{/icons/share.svg}" alt="">
        <p>Compartilhar</p>
      </div>
    </div>

    <!-- ========================= -->
    <!-- CHAT AREA (SCROLL) -->
    <!-- ========================= -->

    <div class="chat-area">

      <div class="messages">

        <!-- Mensagens -->
        <div th:if="${mensagens != null and !mensagens.isEmpty()}">

          <div th:each="msg : ${mensagens}" th:class="'message ' + (${msg.remetente} != 'BOT' ? 'user' : 'bot')">

            <div class="message-wrapper">

              <p class="sender" th:text="${msg.remetente}">
              </p>

              <!-- IMPORTANTE: manter como text para JS converter -->
              <div class="bubble markdown" th:text="${msg.conteudo}">
              </div>

            </div>

          </div>

        </div>

        <!-- Estado vazio -->
        <div class="empty-state" th:if="${mensagens == null or #lists.isEmpty(mensagens)}">

          <img th:src="@{/icons/robot.png}" class="robot-icon" alt="Robot">
          <div>Envie uma mensagem para começar</div>

        </div>

      </div>

    </div>

    <!-- ========================= -->
    <!-- INPUT FIXO -->
    <!-- ========================= -->

    <div class="input-area" th:if="${bot != null}">
      <div class="input-container">

        <form th:action="@{/bots/{id}/messages(id=${bot.id})}" method="post" class="formenviomensagem">

          <input type="text" name="mensage" id="centerinput" placeholder="Digite sua mensagem..." required>

          <button type="submit" class="send-btn" id="send-btn" onclick="disableinput()">
            <img th:src="@{/icons/send.svg}" alt="Enviar">
          </button>

        </form>

      </div>
    </div>

  </div>

  <!-- ========================= -->
  <!-- SCRIPTS -->
  <!-- ========================= -->
  <script th:src="@{/sw.js}"></script>

  <div id="flash-error" th:if="${error}" th:data-message="${error}" style="display:none;">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script th:src="@{/js/bots.js}"></script>
  <script th:src="@{/js/project.js}"></script>


  <!-- MODAL COMPARTILHAR -->
  <div id="share-modal" class="share-modal-overlay">
    <div class="share-modal">

      <div class="share-modal-header">
        <h3>Compartilhar Projeto</h3>
        <button class="share-modal-close" id="close-share-modal">✕</button>
      </div>

      <div class="share-modal-list" id="share-modal-list">
        <div th:each="projeto : ${projetos}" class="share-modal-item" th:attr="data-id=${projeto.id}">
          <span th:text="${projeto.nome}"></span>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
